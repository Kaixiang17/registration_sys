<button class="tab-btn" data-tab="dashboard">📊 艦橋戰情室</button>

<div id="dashboard" class="tab-content panel-border">
    <div class="welcome-banner" style="background: linear-gradient(135deg, #0077ff 0%, #003366 100%);">
        <div class="welcome-title neon-text" id="stat-activity-name">正在讀取任務...</div>
        <div class="welcome-subtitle">同步時間：<span id="stat-last-sync">--:--:--</span></div>
    </div>

    <div class="settings-grid" style="margin-top: 1.5rem;">
        <div class="setting-card cyber-card">
            <div class="setting-label neon-text">🛰️ 登艦進度 (報到率)</div>
            <div class="setting-value" id="stat-rate" style="font-size: 2.5rem; color: #0077ff;">0%</div>
            <div class="cyber-progress">
                <div id="stat-progress-bar" class="cyber-progress-bar" style="width: 0%"></div>
            </div>
            <p id="stat-count" style="margin-top: 0.5rem; font-size: 0.8rem;"></p>
        </div>

        <div class="setting-card cyber-card">
            <div class="setting-label neon-text">🍱 補給品需求 (餐食)</div>
            <div id="stat-meals-list" style="display: flex; flex-direction: column; gap: 0.5rem;">
                </div>
        </div>
    </div>

    <div class="card cyber-card" style="margin-top: 1.5rem;">
        <div class="card-title neon-text">📅 艦隊任務流程表</div>
        <div id="mission-timeline" style="border-left: 2px dashed #0077ff; margin-left: 10px; padding-left: 20px;">
            <p style="color: #0077ff;">● 09:00 - 開啟艙門 (報到開始)</p>
            <p>● 10:30 - 方舟啟航 (開幕致詞)</p>
            <p>● 12:00 - 能量補給 (午餐時間)</p>
        </div>
    </div>
</div>

<script>
    // 定期抓取儀表板數據
    async function updateDashboard() {
        const res = await fetch(`${API_BASE}/dashboard_stats`);
        const json = await res.json();
        if (json.success) {
            document.getElementById('stat-activity-name').textContent = json.activity_name;
            document.getElementById('stat-rate').textContent = json.stats.rate;
            document.getElementById('stat-progress-bar').style.width = json.stats.rate;
            document.getElementById('stat-count').textContent = `已登艦：${json.stats.checked_in} / 總人數：${json.stats.total}`;
            document.getElementById('stat-last-sync').textContent = json.last_sync;

            // 渲染餐食
            const mealList = document.getElementById('stat-meals-list');
            mealList.innerHTML = Object.entries(json.stats.meals).map(([name, count]) => `
                <div style="display:flex; justify-content:space-between; border-bottom:1px solid #ddd;">
                    <span>${name}</span><span class="neon-text">${count} 人</span>
                </div>
            `).join('');
        }
    }
    setInterval(updateDashboard, 30000); // 每 30 秒自動更新一次
</script>
