<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧方舟 - 艦橋管理中心</title>
    <link rel="stylesheet" href="smart-ark-theme.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { line-height: 1.6; min-height: 100vh; }
        
        /* 頂部導航 */
        header { background: rgba(10, 20, 35, 0.8); border-bottom: 1px solid var(--accent-gray); padding: 1rem 0; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .btn-link { color: #fff; text-decoration: none; font-size: 0.9rem; padding: 0.5rem 1rem; border-radius: 0.5rem; transition: all 0.2s; border: 1px solid transparent; }
        .btn-link:hover { border-color: var(--text-dark); background: rgba(0,229,255,0.1); color: var(--text-dark); }

        /* 主容器 */
        main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* 標籤頁 (跟截圖一樣的上方 Tabs) */
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .tab-btn { padding: 1rem 1.5rem; background: none; border: none; border-bottom: 3px solid transparent; font-size: 1rem; font-weight: 600; color: #888; cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .tab-btn.active { color: var(--text-dark); border-bottom-color: var(--text-dark); text-shadow: 0 0 8px var(--text-glow); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 卡片與表單排版 (完美還原你的截圖排版) */
        .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #fff; font-size: 0.95rem; }
        .form-hint { font-size: 0.85rem; color: #aaa; margin-top: 0.4rem; }
        textarea { resize: vertical; min-height: 80px; }

        /* 列表排版 (商品列表) */
        .product-item { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .product-info { display: grid; gap: 0.4rem; }
        .product-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.2rem; }
        .product-field { font-size: 0.9rem; color: #ccc; }
        .product-actions { display: flex; gap: 0.5rem; }

        /* 切換開關 (截圖中的綠色開關) */
        .toggle { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
        .toggle-switch { position: relative; width: 50px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 14px; cursor: pointer; transition: background 0.3s; border: 1px solid rgba(255,255,255,0.3); }
        .toggle-switch.active { background: #16a34a; border-color: #16a34a; }
        .toggle-switch::after { content: ''; position: absolute; width: 24px; height: 24px; background: white; border-radius: 50%; top: 1px; left: 2px; transition: left 0.3s; }
        .toggle-switch.active::after { left: 22px; }

        /* 訊息提示 */
        .alert { padding: 1rem; margin-bottom: 1rem; border-radius: 0.5rem; display: flex; align-items: center; gap: 0.75rem; }
        .alert-success { background: rgba(22, 163, 74, 0.2); border: 1px solid #16a34a; color: #4ade80; }
        .alert-danger { background: rgba(220, 38, 38, 0.2); border: 1px solid #dc2626; color: #f87171; }

        /* 模態框 (彈窗) */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal-content { max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; padding: 2rem; border-radius: 1rem; }
        .modal-header { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }
        .modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
    </style>
</head>
<body class="circuit-background">
    <div class="ark-background"></div>
    
    <header class="panel-border" style="border-top:none; border-left:none; border-right:none; border-radius: 0;">
        <div class="header-container">
            <div class="header-title neon-text" style="font-size: 1.2rem; transform: none;">⚙️ 智慧方舟 - 系統管理中心</div>
            <div class="header-actions">
                <a class="btn-link" href="/">📋 報到首頁</a>
                <a class="btn-link" href="/products">🛍️ 商品頁面</a>
            </div>
        </div>
    </header>

    <main>
        <div id="messageContainer"></div>

        <div class="tabs">
            <button class="tab-btn" data-tab="dashboard">📊 戰情儀表板</button>
            <button class="tab-btn active" data-tab="products">🛍️ 補給品管理</button>
            <button class="tab-btn" data-tab="system">⚙️ 方舟系統設定</button>
        </div>

        <div id="dashboard" class="tab-content">
            <div class="cyber-card" style="padding: 2rem; border-radius: 1rem;">
                <div style="background: rgba(0,229,255,0.1); padding: 1.5rem; border-left: 4px solid var(--text-dark); margin-bottom: 1.5rem;">
                    <div class="neon-text" id="stat-activity-name" style="font-size: 1.5rem; margin-bottom: 0.5rem;">正在讀取任務...</div>
                    <div style="color: #aaa;">衛星同步時間：<span id="stat-last-sync">--:--:--</span></div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem;">
                    <div style="padding: 1.5rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem;">
                        <div style="color: #fff; font-weight: bold; margin-bottom: 1rem;">🛰️ 登艦進度 (報到率)</div>
                        <div id="stat-rate" style="font-size: 3rem; color: var(--text-dark); font-family: 'Michroma'; line-height: 1;">0%</div>
                        <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); margin-top: 1rem; border-radius: 4px;">
                            <div id="stat-progress-bar" style="height: 100%; background: var(--text-dark); width: 0%; border-radius: 4px; box-shadow: 0 0 10px var(--text-glow);"></div>
                        </div>
                        <p id="stat-count" style="margin-top: 0.8rem; font-size: 0.9rem; color: #ccc;"></p>
                    </div>
                    <div style="padding: 1.5rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem;">
                        <div style="color: #fff; font-weight: bold; margin-bottom: 1rem;">🍱 補給需求 (已登艦)</div>
                        <div id="stat-meals-list" style="display: flex; flex-direction: column; gap: 0.8rem;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="products" class="tab-content active">
            <div class="cyber-card" style="padding: 2rem; border-radius: 1rem;">
                <div class="card-title neon-text">📦 商品列表</div>
                <div id="productsList" style="margin-bottom: 1.5rem;"></div>
                <button class="cyber-button" onclick="openAddProductModal()"><span>➕ 新增補給品</span></button>
            </div>
        </div>

        <div id="system" class="tab-content">
            <div class="cyber-card" style="padding: 2rem; border-radius: 1rem; margin-bottom: 1.5rem;">
                <div class="card-title neon-text">🔧 基本設定</div>
                <div class="form-group">
                    <label>Google Sheet 名稱</label>
                    <input type="text" class="cyber-input" id="googleSheetName" placeholder="例：活動報到名單">
                    <div class="form-hint">請確保 Google Sheet 名稱與實際檔案相符</div>
                </div>
                <div class="form-group">
                    <div class="toggle">
                        <label style="margin: 0; cursor: pointer;" onclick="toggleMealOption()">啟用餐點選項</label>
                        <div class="toggle-switch" id="mealToggle" onclick="toggleMealOption()"></div>
                    </div>
                    <div class="form-hint">勾選後，報到時會詢問餐食選擇</div>
                </div>
                <button class="cyber-button" onclick="saveSystemSettings()" style="margin-top: 1rem;"><span>💾 儲存設定</span></button>
            </div>

            <div class="cyber-card" style="padding: 2rem; border-radius: 1rem;">
                <div class="card-title neon-text">📋 Excel 欄位對應</div>
                <div class="form-hint" style="margin-bottom: 1.5rem;">設定 Google Sheet 中各欄位的位置（第幾欄）</div>
                
                <div id="excelColumnsContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem;">
                    </div>
                
                <button class="cyber-button" onclick="saveSystemSettings()" style="margin-top: 2rem;"><span>💾 儲存設定</span></button>
            </div>
        </div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content cyber-card">
            <div class="modal-header neon-text" id="modalTitle">新增補給品</div>
            <div class="form-group">
                <label>補給品名稱 *</label>
                <input type="text" class="cyber-input" id="productName" placeholder="例：專屬紀念 T-Shirt">
            </div>
            <div class="form-group">
                <label>補給品圖片網址</label>
                <input type="url" class="cyber-input" id="productImage" placeholder="https://...">
                <div class="form-hint">建議使用 HTTPS 網址</div>
            </div>
            <div class="form-group">
                <label>補給品簡介</label>
                <textarea id="productDescription" class="cyber-input" placeholder="描述商品特色..."></textarea>
            </div>
            <div class="form-group">
                <label>補給品連結</label>
                <input type="url" class="cyber-input" id="productLink" placeholder="https://...">
                <div class="form-hint">點擊「前往商品頁面」時開啟的連結</div>
            </div>
            <div class="modal-footer">
                <button class="cyber-button" style="border-color:#888; color:#aaa;" onclick="closeProductModal()"><span>取消</span></button>
                <button class="cyber-button" onclick="saveProduct()"><span id="saveButtonText">新增</span></button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content cyber-card" style="border-left-color: #dc2626;">
            <div class="modal-header" style="color: #dc2626;">⚠️ 確認刪除</div>
            <p>確定要移除補給品「<strong id="deleteProductName" style="color:#fff;"></strong>」嗎？此操作無法復原。</p>
            <div class="modal-footer">
                <button class="cyber-button" style="border-color:#888; color:#aaa;" onclick="closeDeleteModal()"><span>取消</span></button>
                <button class="cyber-button" style="border-color:#dc2626; color:#dc2626;" onclick="confirmDelete()"><span>刪除</span></button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentConfig = null;
        let editingProductId = null;
        let deleteProductId = null;

        async function init() {
            await loadConfig();
            setupTabButtons();
            updateDashboard(); 
            setInterval(updateDashboard, 30000);
        }

        function setupTabButtons() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
                    document.getElementById(btn.getAttribute('data-tab')).classList.add('active');
                    btn.classList.add('active');
                });
            });
        }

        async function loadConfig() {
            try {
                const res = await fetch(`${API_BASE}/config`);
                currentConfig = await res.json();
                renderProducts();
                renderSystemSettings();
            } catch (e) { showMessage('無法載入設定：' + e.message, 'danger'); }
        }

        async function saveConfig() {
            try {
                const res = await fetch(`${API_BASE}/config`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentConfig)
                });
                const data = await res.json();
                if (data.success) { currentConfig = data.data; return true; }
                return false;
            } catch (e) { return false; }
        }

        // ==================== 補給品管理 (還原截圖的打勾打叉) ====================
        function renderProducts() {
            const container = document.getElementById('productsList');
            const products = currentConfig.products || [];
            
            if (products.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:2rem; color:#888;">尚無商品資料</div>`;
                return;
            }
            
            container.innerHTML = products.map((p, idx) => `
                <div class="product-item">
                    <div>
                        <div class="product-name neon-text">${escapeHtml(p.name || '未命名')}</div>
                        <div class="product-field">📸 圖片：${p.image ? '<span style="color:#4ade80">✓ 已設定</span>' : '<span style="color:#f87171">✗ 未設定</span>'}</div>
                        <div class="product-field">📝 簡介：${p.description ? escapeHtml(p.description.substring(0, 40)) + '...' : '未設定'}</div>
                        <div class="product-field">🔗 連結：${p.link ? '<span style="color:#4ade80">✓ 已設定</span>' : '<span style="color:#f87171">✗ 未設定</span>'}</div>
                    </div>
                    <div class="product-actions">
                        <button class="cyber-button" style="padding:0.5rem 1rem;" onclick="editProduct(${idx})"><span>編輯</span></button>
                        <button class="cyber-button" style="padding:0.5rem 1rem; border-color:#dc2626; color:#dc2626;" onclick="openDeleteModal(${idx})"><span>刪除</span></button>
                    </div>
                </div>
            `).join('');
        }

        // ==================== 系統設定 (還原截圖表單) ====================
        function renderSystemSettings() {
            document.getElementById('googleSheetName').value = currentConfig.google_sheet_name || '';
            const mealToggle = document.getElementById('mealToggle');
            if (currentConfig.show_meal_options) mealToggle.classList.add('active');
            else mealToggle.classList.remove('active');
            renderExcelColumns();
        }

        function renderExcelColumns() {
            const container = document.getElementById('excelColumnsContainer');
            const cols = currentConfig.excel_columns || {};
            const columnNames = { id: '編號', name: '姓名', phone: '電話', company: '公司', email: '信箱', qrCode: 'QR Code', registeredAt: '報名時間', checkedInAt: '報到時間', status: '狀態', meal: '餐食' };
            
            container.innerHTML = Object.entries(columnNames).map(([key, label]) => `
                <div>
                    <label>${label}</label>
                    <input type="number" class="cyber-input" min="1" max="30" value="${cols[key] || ''}" onchange="updateExcelColumn('${key}', this.value)">
                    <div class="form-hint">第 ${cols[key] || '?'} 欄</div>
                </div>
            `).join('');
        }

        function toggleMealOption() {
            currentConfig.show_meal_options = !currentConfig.show_meal_options;
            renderSystemSettings();
        }

        function updateExcelColumn(key, value) {
            if (!currentConfig.excel_columns) currentConfig.excel_columns = {};
            currentConfig.excel_columns[key] = parseInt(value) || 0;
        }

        async function saveSystemSettings() {
            currentConfig.google_sheet_name = document.getElementById('googleSheetName').value.trim();
            if (await saveConfig()) showMessage('方舟系統設定已成功儲存', 'success');
            else showMessage('設定儲存失敗', 'danger');
        }

        // ==================== 模態框邏輯 ====================
        function openAddProductModal() {
            editingProductId = null;
            document.getElementById('modalTitle').textContent = '新增補給品';
            document.getElementById('saveButtonText').textContent = '新增';
            ['productName', 'productImage', 'productDescription', 'productLink'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('productModal').classList.add('active');
        }

        function editProduct(idx) {
            const p = currentConfig.products[idx];
            editingProductId = idx;
            document.getElementById('modalTitle').textContent = '編輯補給品';
            document.getElementById('saveButtonText').textContent = '更新';
            document.getElementById('productName').value = p.name || '';
            document.getElementById('productImage').value = p.image || '';
            document.getElementById('productDescription').value = p.description || '';
            document.getElementById('productLink').value = p.link || '';
            document.getElementById('productModal').classList.add('active');
        }

        async function saveProduct() {
            const name = document.getElementById('productName').value.trim();
            if (!name) return showMessage('請輸入補給品名稱', 'danger');
            const p = {
                id: editingProductId !== null ? currentConfig.products[editingProductId].id : 'p' + Date.now(),
                name,
                image: document.getElementById('productImage').value.trim(),
                description: document.getElementById('productDescription').value.trim(),
                link: document.getElementById('productLink').value.trim()
            };
            if (editingProductId !== null) currentConfig.products[editingProductId] = p;
            else { if (!currentConfig.products) currentConfig.products = []; currentConfig.products.push(p); }
            if (await saveConfig()) { renderProducts(); closeProductModal(); showMessage('補給品已儲存', 'success'); }
        }

        function openDeleteModal(idx) { deleteProductId = idx; document.getElementById('deleteProductName').textContent = currentConfig.products[idx].name; document.getElementById('deleteModal').classList.add('active'); }
        function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }
        function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('active'); }
        async function confirmDelete() {
            if (deleteProductId !== null) { currentConfig.products.splice(deleteProductId, 1); if (await saveConfig()) { renderProducts(); closeDeleteModal(); showMessage('補給品已刪除', 'success');} }
        }

        // ==================== 儀表板數據 ====================
        async function updateDashboard() {
            try {
                const res = await fetch(`${API_BASE}/dashboard_stats`);
                const json = await res.json();
                if (json.success) {
                    document.getElementById('stat-activity-name').textContent = json.activity_name;
                    document.getElementById('stat-rate').textContent = json.stats.rate;
                    document.getElementById('stat-progress-bar').style.width = json.stats.rate;
                    document.getElementById('stat-count').textContent = `已登艦：${json.stats.checked_in} / 總人數：${json.stats.total}`;
                    document.getElementById('stat-last-sync').textContent = json.last_sync;

                    const mealList = document.getElementById('stat-meals-list');
                    if (Object.keys(json.stats.meals).length === 0) mealList.innerHTML = '<div style="color: #888;">尚未有登艦紀錄</div>';
                    else mealList.innerHTML = Object.entries(json.stats.meals).map(([name, count]) => `
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:0.5rem;">
                            <span>${name}</span><span class="neon-text">${count} 人</span>
                        </div>`).join('');
                }
            } catch (e) { document.getElementById('stat-activity-name').textContent = "衛星連線失敗"; }
        }

        function showMessage(text, type = 'info') {
            document.getElementById('messageContainer').innerHTML = `<div class="alert alert-${type}">${text}</div>`;
            setTimeout(() => document.getElementById('messageContainer').innerHTML = '', 3000);
        }
        function escapeHtml(str) { return str ? String(str).replace(/[&<>"']/g, m => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'}[m])) : ''; }

        window.onload = init;
    </script>
</body>
</html>
