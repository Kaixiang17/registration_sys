<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧方舟 - 活動報到系統</title>
    <link rel="stylesheet" href="smart-ark-theme.css">
    <style>
        /* 保留你完美的原始排版，絕不跑版 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", "Michroma", "Stick", sans-serif; }
        body { line-height: 1.6; }
        
        header { background: rgba(255,255,255,0.9); border-bottom: 1px solid var(--accent-gray); padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1000px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 1000px; margin: 0 auto; padding: 3rem 1rem; }
        .state-hidden { display: none !important; }
        
        /* 核心排版 1：三個選項並排 (第二張圖的排列) */
        .mode-selection-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .mode-card { padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s ease; border-radius: 1rem; }
        
        /* 核心排版 2：所有表單置中且限制寬度 */
        .form-card { max-width: 500px; margin: 0 auto; padding: 2.5rem; text-align: center; border-radius: 1rem; }
        
        /* 列表與細節排版 */
        .group-list { margin-top: 1rem; max-height: 300px; overflow-y: auto; text-align: left; border-radius: 0.5rem; padding: 0.5rem; background: rgba(255,255,255,0.8); }
        .group-item { display: flex; align-items: center; padding: 0.8rem; border-bottom: 1px solid rgba(168,168,168,0.3); }
        
        .meal-option { display: flex; align-items: center; gap: 1rem; padding: 1.25rem; border: 2px solid var(--accent-gray); border-radius: 0.75rem; cursor: pointer; margin-bottom: 1rem; background: rgba(255,255,255,0.7); }
        .meal-option.selected { border-color: var(--text-dark); background: rgba(0, 119, 255, 0.1); }
        
        .info-box { text-align: left; background: rgba(255,255,255,0.9); padding: 1.5rem; border-radius: 0.75rem; font-size: 1.05rem; line-height: 1.8; margin-bottom: 1.5rem; border: 1px solid var(--accent-gray); }
        
        /* 調整按鈕與輸入框的間距 */
        .cyber-input { width: 100%; margin-bottom: 1.5rem; }
        .cyber-button { width: 100%; margin-top: 0.5rem; }
    </style>
</head>
<body class="circuit-background">
    <div class="ark-background"></div>

    <header class="panel-border" style="border-top:none; border-left:none; border-right:none;">
        <div class="header-container">
            <div onclick="location.reload()" style="cursor:pointer; color:var(--text-muted); font-weight: bold;">🏠 首頁導航</div>
            <div class="neon-text" style="font-size: 1.2rem; margin:0;">活動報到系統</div>
            <div id="status" style="font-size: 0.8rem; color: var(--text-muted);">連線中...</div>
        </div>
    </header>

    <main>
        <div id="modeState">
            <div style="text-align:center; margin-bottom: 3rem;">
                <h1 class="neon-text" style="display: block; font-size: 2.2rem; margin-bottom: 0.5rem;">歡迎參加活動</h1>
                <p style="color: var(--text-muted); font-weight: bold;">請選擇您的需求項目</p>
            </div>
            <div class="mode-selection-grid">
                <div class="mode-card cyber-card cyber-hover" onclick="setMode('individual')">
                    <span style="font-size:4rem; display:block; margin-bottom:1rem;">👤</span>
                    <h2 class="neon-text" style="margin-bottom:0.5rem;">個人報到</h2>
                    <p style="color:var(--text-muted); font-size:0.9rem;">使用電話、姓名或 Email 驗證身分。</p>
                </div>
                <div class="mode-card cyber-card cyber-hover" onclick="setMode('group')">
                    <span style="font-size:4rem; display:block; margin-bottom:1rem;">🏢</span>
                    <h2 class="neon-text" style="margin-bottom:0.5rem;">公司團體報到</h2>
                    <p style="color:var(--text-muted); font-size:0.9rem;">一次為多位同仁辦理報到手續。</p>
                </div>
                <div class="mode-card cyber-card cyber-hover" onclick="showProducts()">
                    <span style="font-size:4rem; display:block; margin-bottom:1rem;">🛍️</span>
                    <h2 class="neon-text" style="margin-bottom:0.5rem;">活動商品專區</h2>
                    <p style="color:var(--text-muted); font-size:0.9rem;">瀏覽及選購本次活動精選商品。</p>
                </div>
            </div>
        </div>

        <div id="actionState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="setAppState('mode')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 id="actionTitle" class="neon-text" style="margin-bottom:1.5rem; display:block;">驗證</h2>
                <input type="text" id="actionInput" class="cyber-input" placeholder="請輸入資訊">
                <button class="button cyber-button" onclick="handleAction()">下一步</button>
            </div>
        </div>

        <div id="companySelectionState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="setAppState('action')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 class="neon-text" style="margin-bottom:1.5rem; display:block;">請選擇所屬公司</h2>
                <div id="companyList" style="display:grid; gap:0.8rem; text-align:left;"></div>
            </div>
        </div>

        <div id="groupListState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="setAppState('action')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 id="groupName" class="neon-text" style="margin-bottom:1rem; display:block;">公司人員名單</h2>
                <div id="groupList" class="group-list panel-border"></div>
                <button class="button cyber-button" style="margin-top:1.5rem;" onclick="proceedToMeal()">下一步</button>
            </div>
        </div>

        <div id="mealState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="setAppState(checkMode==='individual'?'action':'groupList')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 class="neon-text" style="margin-bottom:1.5rem; display:block;">🍱 餐食選擇</h2>
                <div>
                    <div class="meal-option cyber-hover" id="m-葷食" onclick="selectMeal('葷食')">🍖 葷食</div>
                    <div class="meal-option cyber-hover" id="m-素食" onclick="selectMeal('素食')">🥗 素食</div>
                    <div class="meal-option cyber-hover" id="m-不須用餐" onclick="selectMeal('不須用餐')">❌ 不須用餐</div>
                </div>
                <button id="finalBtn" class="button cyber-button" disabled style="margin-top: 1rem;" onclick="submitCheckin()">確認報到</button>
            </div>
        </div>

        <div id="successState" class="state-hidden">
            <div class="form-card cyber-card">
                <div style="color:var(--text-dark); font-size:4.5rem; line-height: 1; text-shadow: 0 0 15px rgba(0,119,255,0.4);">✓</div>
                <h2 class="neon-text" style="margin-bottom:1.5rem; display:block;">報到成功！</h2>
                
                <div id="successInfo" class="info-box panel-border"></div>
                
                <p style="color:var(--text-muted); margin-bottom: 1.5rem;">資料已同步至雲端。<br><strong style="color:var(--text-dark);">10 秒後自動跳轉商品頁面...</strong></p>
                <button class="button cyber-button" onclick="showProducts()">🛍️ 立即前往商品頁</button>
            </div>
        </div>
    </main>

    <script>
        // 完全保留你原本一階段一階段的純淨 JS 邏輯
        const API_BASE = '/api';
        let checkMode = '', selectedUser = null, matchedCompanies = [], selectedGroup = [], selectedMeal = '';

        function setAppState(s) {
            ['mode', 'action', 'companySelection', 'groupList', 'meal', 'success'].forEach(x => {
                const el = document.getElementById(x+'State');
                if(el) el.classList.add('state-hidden');
            });
            document.getElementById(s+'State').classList.remove('state-hidden');
        }

        function setMode(m) {
            checkMode = m;
            document.getElementById('actionTitle').textContent = m === 'individual' ? '請輸入姓名' : '請輸入公司名稱';
            document.getElementById('actionInput').value = '';
            setAppState('action');
        }

        async function handleAction() {
            const val = document.getElementById('actionInput').value.trim();
            if(!val) return;
            try {
                const res = await fetch(`${API_BASE}/search/${checkMode === 'individual' ? 'name' : 'company'}?${checkMode === 'individual' ? 'name' : 'company'}=${val}`);
                const json = await res.json();
                
                if (json.data.length > 0) {
                    if (checkMode === 'individual') { 
                        selectedUser = json.data[0]; 
                        setAppState('meal'); 
                    } else { 
                        const groups = {}; 
                        json.data.forEach(p => { if(!groups[p.company]) groups[p.company] = []; groups[p.company].push(p); });
                        matchedCompanies = Object.keys(groups).map(name => ({ name, participants: groups[name] }));
                        
                        if (matchedCompanies.length === 1) {
                            selectCompany(0);
                        } else {
                            document.getElementById('companyList').innerHTML = matchedCompanies.map((c, i) => 
                                `<div class="cyber-hover panel-border" onclick="selectCompany(${i})" style="padding:1rem; border-radius:0.5rem; cursor:pointer; background:rgba(255,255,255,0.8);">
                                    <b>${c.name}</b> <span style="color:var(--text-muted);">(${c.participants.length} 人)</span>
                                </div>`).join('');
                            setAppState('companySelection');
                        }
                    }
                } else alert('查無資料，請確認輸入是否正確');
            } catch(e) { alert('伺服器連線異常'); }
        }

        function selectCompany(index) {
            const company = matchedCompanies[index];
            document.getElementById('groupName').textContent = company.name;
            document.getElementById('groupList').innerHTML = company.participants.map(u => {
                const isCheck = u.status === 'checked_in' || u.status === '已報到';
                return `<div class="group-item">
                            <input type="checkbox" value="${u.id}" class="u-cb" ${isCheck ? 'disabled' : ''} style="margin-right:15px; transform:scale(1.3); cursor:pointer;"> 
                            <span style="flex:1; font-weight:bold;">${u.name}</span>
                            <span style="font-size:0.85rem; color:${isCheck ? 'var(--text-dark)' : 'var(--text-muted)'}">${isCheck ? '(已報到)' : '(未報到)'}</span>
                        </div>`;
            }).join('');
            window.tempGroupData = company.participants;
            setAppState('groupList');
        }

        function proceedToMeal() {
            const ids = Array.from(document.querySelectorAll('.u-cb:checked')).map(cb => cb.value);
            selectedGroup = window.tempGroupData.filter(u => ids.includes(u.id));
            if (selectedGroup.length === 0) return alert('請至少勾選一位尚未報到的同仁');
            setAppState('meal');
        }

        function selectMeal(m) {
            selectedMeal = m;
            document.querySelectorAll('.meal-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('m-'+m).classList.add('selected');
            document.getElementById('finalBtn').disabled = false;
        }

        async function submitCheckin() {
            const btn = document.getElementById('finalBtn');
            btn.disabled = true;
            btn.textContent = '處理中...';
            
            const isIndiv = checkMode === 'individual';
            const url = isIndiv ? `${API_BASE}/checkin/${selectedUser.id}` : `${API_BASE}/checkin/batch`;
            const body = isIndiv ? { meal: selectedMeal, name: selectedUser.name } : { selections: selectedGroup.map(u => ({ id: u.id, name: u.name, meal: selectedMeal })) };
            
            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                const json = await res.json();
                
                if (json.success) {
                    const infoBox = document.getElementById('successInfo');
                    const p = isIndiv ? json.data : json.data[0];
                    
                    if (isIndiv) {
                        infoBox.innerHTML = `
                            <b style="color:var(--text-dark);">姓名：</b>${p.name}<br>
                            <b style="color:var(--text-dark);">公司：</b>${p.company || '無'}<br>
                            <b style="color:var(--text-dark);">餐食：</b>${p.meal}<br>
                            <b style="color:var(--text-dark);">時間：</b>${p.checkedInAt}
                        `;
                    } else {
                        infoBox.innerHTML = `
                            <b style="color:var(--text-dark);">公司：</b>${p.company || '無'}<br>
                            <b style="color:var(--text-dark);">已報到人數：</b>${json.data.length} 人<br>
                            <b style="color:var(--text-dark);">餐食：</b>${selectedMeal}<br>
                            <b style="color:var(--text-dark);">時間：</b>${p.checkedInAt}
                        `;
                    }
                    
                    setAppState('success');
                    setTimeout(() => location.href = '/商品頁面.html', 2000);
                } else {
                    alert('報到失敗，請重試');
                    btn.disabled = false;
                    btn.textContent = '確認報到';
                }
            } catch (e) {
                alert('網路錯誤');
                btn.disabled = false;
                btn.textContent = '確認報到';
            }
        }

        window.onload = async () => {
            try {
                const res = await fetch(`${API_BASE}/config`);
                if (res.ok) {
                    const st = document.getElementById('status');
                    st.textContent = '🟢 已連線雲端';
                    st.style.color = '#16a34a';
                }
            } catch(e) {}
        };
    </script>
</body>
</html>
