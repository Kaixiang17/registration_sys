<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧方舟 - 活動報到系統</title>
    <link rel="stylesheet" href="smart-ark-theme.css">
    <style>
        /* 基礎排版 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", "Michroma", "Stick", sans-serif; }
        body { line-height: 1.6; }
        
        header { background: rgba(255,255,255,0.9); border-bottom: 1px solid var(--accent-gray); padding: 1rem 0; position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1000px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 1000px; margin: 0 auto; padding: 3rem 1rem; }
        .state-hidden { display: none !important; }
        
        .mode-selection-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .mode-card { padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s ease; border-radius: 1rem; }
        
        .form-card { max-width: 500px; margin: 0 auto; padding: 2.5rem; text-align: center; border-radius: 1rem; }
        .form-card-large { max-width: 650px; margin: 0 auto; padding: 2.5rem; text-align: center; border-radius: 1rem; }
        
        .group-list { margin-top: 1rem; max-height: 300px; overflow-y: auto; text-align: left; border-radius: 0.5rem; padding: 0.5rem; background: rgba(255,255,255,0.8); }
        .group-item { display: flex; align-items: center; padding: 0.8rem; border-bottom: 1px solid rgba(168,168,168,0.3); }
        
        .info-box { text-align: left; background: rgba(255,255,255,0.9); padding: 1.5rem; border-radius: 0.75rem; font-size: 1.05rem; line-height: 1.8; margin-bottom: 1.5rem; border: 1px solid var(--accent-gray); }
        
        .cyber-input { width: 100%; margin-bottom: 1.5rem; }
        .cyber-button { width: 100%; margin-top: 0.5rem; }

        /* 動態餐點卡片樣式 */
        .user-meal-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            text-align: left;
        }
        .meal-btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .meal-btn {
            padding: 0.6rem;
            text-align: center;
            border: 1px solid var(--accent-gray);
            border-radius: 0.3rem;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.6);
            color: #ccc;
        }
        .meal-btn.selected {
            border-color: var(--text-dark);
            background: rgba(0, 229, 255, 0.2);
            color: #fff;
            box-shadow: inset 0 0 10px rgba(0,229,255,0.2);
        }
    </style>
</head>
<body class="circuit-background">
    <div class="ark-background"></div>

    <header class="panel-border" style="border-top:none; border-left:none; border-right:none;">
        <div class="header-container">
            <div onclick="location.reload()" style="cursor:pointer; color:var(--text-muted); font-weight: bold;">🏠 首頁導航</div>
            <div class="neon-text" style="font-size: 1.2rem; margin:0;">活動報到系統</div>
            <div id="status" style="font-size: 0.8rem; color: var(--text-muted);">連線中...</div>
        </div>
    </header>

    <main>
        <div id="modeState">
            <div style="text-align:center; margin-bottom: 3rem;">
                <h1 class="neon-text" style="display: block; font-size: 2.2rem; margin-bottom: 0.5rem;">歡迎參加活動</h1>
                <p style="color: var(--text-muted); font-weight: bold;">請選擇您的需求項目</p>
            </div>
            <div class="mode-selection-grid">
                <div class="mode-card cyber-card cyber-hover" onclick="setMode('individual')">
                    <span style="font-size:4rem; display:block; margin-bottom:1rem;">👤</span>
                    <h2 class="neon-text" style="margin-bottom:0.5rem;">個人報到</h2>
                </div>
                <div class="mode-card cyber-card cyber-hover" onclick="setMode('group')">
                    <span style="font-size:4rem; display:block; margin-bottom:1rem;">🏢</span>
                    <h2 class="neon-text" style="margin-bottom:0.5rem;">公司團體報到</h2>
                </div>
                <div class="mode-card cyber-card cyber-hover" onclick="showProducts()">
                    <span style="font-size:4rem; display:block; margin-bottom:1rem;">🛍️</span>
                    <h2 class="neon-text" style="margin-bottom:0.5rem;">活動商品專區</h2>
                </div>
            </div>
        </div>

        <div id="actionState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="resetToHome()" style="float:left; background:none; border:none; color:var(--accent-gray); cursor:pointer; font-weight:bold;">← 取消返回</button>
                <div style="clear:both;"></div>
                <h2 id="actionTitle" class="neon-text" style="margin: 1.5rem 0;">身分驗證</h2>
                
                <input type="text" id="actionInput" class="cyber-input" placeholder="輸入您的電話 / 姓名 / 信箱" style="margin-bottom: 0.5rem;">
                <p id="actionHint" style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem; text-align:left;">系統將自動比對您的報名資料</p>
                
                <button class="cyber-button" style="width:100%;" onclick="handleAction()"><span>下一步：搜尋數據</span></button>
            </div>
        </div>

        <div id="companySelectionState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="setAppState('action')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 class="neon-text" style="margin-bottom:1.5rem; display:block;">請選擇所屬公司</h2>
                <div id="companyList" style="display:grid; gap:0.8rem; text-align:left;"></div>
            </div>
        </div>

        <div id="groupListState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="setAppState('action')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 id="groupName" class="neon-text" style="margin-bottom:1rem; display:block;">公司人員名單</h2>
                <div id="groupList" class="group-list panel-border"></div>
                <button class="button cyber-button" style="margin-top:1.5rem;" onclick="proceedToMeal()">下一步：補給配置</button>
            </div>
        </div>

        <div id="mealState" class="state-hidden">
            <div class="form-card-large cyber-card">
                <button onclick="setAppState(checkMode==='individual'?'action':'groupList')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 class="neon-text" style="margin-bottom:1.5rem; display:block;">🍱 配置人員能量補給</h2>
                
                <div style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1rem; text-align:left;">已為全員預設選項，您可點擊修改特定人員的配置。</div>
                
                <div id="mealOptionsContainer" style="max-height:400px; overflow-y:auto; padding-right:10px;"></div>

                <button id="finalBtn" class="button cyber-button" style="margin-top: 1.5rem;" onclick="submitCheckin()">確認登艦並傳送數據</button>
            </div>
        </div>

        <div id="successState" class="state-hidden">
            <div class="form-card cyber-card">
                <div style="color:var(--text-dark); font-size:4.5rem; line-height: 1; text-shadow: 0 0 15px rgba(0,119,255,0.4);">✓</div>
                <h2 class="neon-text" style="margin-bottom:1.5rem; display:block;">報到成功！</h2>
                <div id="successInfo" class="info-box panel-border"></div>
                
                <p style="color:var(--text-muted); margin-bottom: 1.5rem;">資料已同步至雲端。<br><strong style="color:var(--text-dark);"><span id="timerDisplay">10</span> 秒後自動跳轉商品頁面...</strong></p>
                <button class="button cyber-button" onclick="showProducts()">🛍️ 立即前往商品頁</button>
            </div>
        </div>

        <div id="productState" class="state-hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                <h1 class="neon-text" style="display:block;">🛍️ 方舟補給專區</h1>
                <button class="button cyber-button" style="width:auto; margin-top:0;" onclick="setAppState('mode')">← 返回大廳</button>
            </div>
            <div id="productsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem;"></div>
        </div>

    </main>

    <script>
        const API_BASE = '/api';
        let checkMode = '', selectedUser = null, matchedCompanies = [], selectedGroup = [];
        let jumpTimer = null; 
        
        // 新增：儲存每個人對應的餐點選擇
        let groupMealSelections = {}; 
        let systemConfigData = null;

        function setAppState(s) {
            ['mode', 'action', 'companySelection', 'groupList', 'meal', 'success', 'product'].forEach(x => {
                const el = document.getElementById(x+'State');
                if(el) el.classList.add('state-hidden');
            });
            document.getElementById(s+'State').classList.remove('state-hidden');
            window.scrollTo(0,0);
        }

        function setMode(m) {
            checkMode = m;
            document.getElementById('actionTitle').textContent = m === 'individual' ? '請輸入姓名' : '請輸入公司名稱';
            document.getElementById('actionInput').value = '';
            setAppState('action');
        }

        async function handleAction() {
            const val = document.getElementById('actionInput').value.trim();
            if(!val) return;
            try {
                const res = await fetch(`${API_BASE}/search/${checkMode === 'individual' ? 'name' : 'company'}?${checkMode === 'individual' ? 'name' : 'company'}=${val}`);
                const json = await res.json();
                
                if (json.data.length > 0) {
                    if (checkMode === 'individual') { 
                        selectedUser = json.data[0]; 
                        renderMealSelectionUI(); // 進入個人餐食
                        setAppState('meal'); 
                    } else { 
                        const groups = {}; 
                        json.data.forEach(p => { if(!groups[p.company]) groups[p.company] = []; groups[p.company].push(p); });
                        matchedCompanies = Object.keys(groups).map(name => ({ name, participants: groups[name] }));
                        
                        if (matchedCompanies.length === 1) { selectCompany(0); } 
                        else {
                            document.getElementById('companyList').innerHTML = matchedCompanies.map((c, i) => 
                                `<div class="cyber-hover panel-border" onclick="selectCompany(${i})" style="padding:1rem; border-radius:0.5rem; cursor:pointer; background:rgba(255,255,255,0.8);">
                                    <b>${c.name}</b> <span style="color:var(--text-muted);">(${c.participants.length} 人)</span>
                                </div>`).join('');
                            setAppState('companySelection');
                        }
                    }
                } else alert('查無資料，請確認輸入是否正確');
            } catch(e) { alert('伺服器連線異常'); }
        }

        function selectCompany(index) {
            const company = matchedCompanies[index];
            document.getElementById('groupName').textContent = company.name;
            document.getElementById('groupList').innerHTML = company.participants.map(u => {
                const isCheck = u.status === 'checked_in' || u.status === '已報到';
                return `<div class="group-item">
                            <input type="checkbox" value="${u.id}" class="u-cb" ${isCheck ? 'disabled' : ''} style="margin-right:15px; transform:scale(1.3); cursor:pointer;"> 
                            <span style="flex:1; font-weight:bold;">${u.name}</span>
                            <span style="font-size:0.85rem; color:${isCheck ? 'var(--text-dark)' : 'var(--text-muted)'}">${isCheck ? '(已報到)' : '(未報到)'}</span>
                        </div>`;
            }).join('');
            window.tempGroupData = company.participants;
            setAppState('groupList');
        }

        // ==========================================
        // ★ 核心升級：動態生成每人獨立的餐點選項介面
        // ==========================================
        function proceedToMeal() {
            const ids = Array.from(document.querySelectorAll('.u-cb:checked')).map(cb => cb.value);
            selectedGroup = window.tempGroupData.filter(u => ids.includes(u.id));
            if (selectedGroup.length === 0) return alert('請至少勾選一位尚未報到的同仁');
            
            renderMealSelectionUI(); // 進入團體餐食
            setAppState('meal');
        }

        function renderMealSelectionUI() {
            const container = document.getElementById('mealOptionsContainer');
            container.innerHTML = '';
            groupMealSelections = {}; // 清空選擇

            // 從雲端設定抓取選項，若無則預設
            const mealTypes = (systemConfigData && systemConfigData.meal_types) ? systemConfigData.meal_types : ['葷食', '素食', '不須用餐'];
            const targets = checkMode === 'individual' ? [selectedUser] : selectedGroup;

            targets.forEach(user => {
                // 自動幫所有人預設為陣列中的第一個選項 (通常是葷食)
                groupMealSelections[user.id] = mealTypes[0];

                const userCard = document.createElement('div');
                userCard.className = 'user-meal-card';

                let html = `<div style="font-weight:bold; color:var(--text-dark);">${user.name}</div>
                            <div class="meal-btn-group">`;

                mealTypes.forEach((m, idx) => {
                    const isSelectedClass = idx === 0 ? 'selected' : '';
                    html += `<div class="meal-btn user-${user.id}-btn ${isSelectedClass}" data-meal="${m}" onclick="selectUserMeal('${user.id}', '${m}')">${m}</div>`;
                });

                html += `</div>`;
                userCard.innerHTML = html;
                container.appendChild(userCard);
            });

            document.getElementById('finalBtn').disabled = false;
        }

        // 點擊變更某人的餐點
        function selectUserMeal(userId, mealName) {
            groupMealSelections[userId] = mealName;
            
            // UI 狀態切換
            document.querySelectorAll(`.user-${userId}-btn`).forEach(btn => btn.classList.remove('selected'));
            document.querySelector(`.user-${userId}-btn[data-meal="${mealName}"]`).classList.add('selected');
        }

        // ==========================================
        // 提交報到 (組合每個人的選擇送出)
        // ==========================================
        async function submitCheckin() {
            const btn = document.getElementById('finalBtn');
            btn.disabled = true;
            btn.textContent = '傳輸數據中...';
            
            const isIndiv = checkMode === 'individual';
            const url = isIndiv ? `${API_BASE}/checkin/${selectedUser.id}` : `${API_BASE}/checkin/batch`;
            
            let body;
            if (isIndiv) {
                // 個人報到：取他對應的 id
                body = { meal: groupMealSelections[selectedUser.id], name: selectedUser.name };
            } else {
                // 團體報到：組合 selections 陣列
                body = { 
                    selections: selectedGroup.map(u => ({ 
                        id: u.id, 
                        name: u.name, 
                        meal: groupMealSelections[u.id] 
                    })) 
                };
            }
            
            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                const json = await res.json();
                
                if (json.success) {
                    const infoBox = document.getElementById('successInfo');
                    const p = isIndiv ? json.data : json.data[0];
                    
                    if (isIndiv) {
                        infoBox.innerHTML = `
                            <b style="color:var(--text-dark);">登艦人員：</b>${p.name}<br>
                            <b style="color:var(--text-dark);">所屬艦隊：</b>${p.company || '無'}<br>
                            <b style="color:var(--text-dark);">補給配置：</b>${groupMealSelections[selectedUser.id]}<br>
                            <b style="color:var(--text-dark);">時間：</b>${p.checkedInAt}
                        `;
                    } else {
                        // 計算團體的總餐食統計
                        let mealCounts = {};
                        selectedGroup.forEach(u => {
                            let m = groupMealSelections[u.id];
                            mealCounts[m] = (mealCounts[m] || 0) + 1;
                        });
                        let mealSummary = Object.entries(mealCounts).map(([m, c]) => `${m}: ${c}人`).join(' / ');

                        infoBox.innerHTML = `
                            <b style="color:var(--text-dark);">所屬艦隊：</b>${p.company || '無'}<br>
                            <b style="color:var(--text-dark);">已報到人數：</b>${json.data.length} 人<br>
                            <b style="color:var(--text-dark);">補給總覽：</b>${mealSummary}<br>
                            <b style="color:var(--text-dark);">時間：</b>${p.checkedInAt}
                        `;
                    }
                    
                    setAppState('success');
                    
                    let timeLeft = 10;
                    document.getElementById('timerDisplay').textContent = timeLeft;
                    if(jumpTimer) clearInterval(jumpTimer); 
                    
                    jumpTimer = setInterval(() => {
                        timeLeft--;
                        document.getElementById('timerDisplay').textContent = timeLeft;
                        if(timeLeft <= 0) {
                            clearInterval(jumpTimer);
                            if(!document.getElementById('successState').classList.contains('state-hidden')) { showProducts(); }
                        }
                    }, 1000);

                } else {
                    alert('報到失敗，請重試');
                    btn.disabled = false;
                    btn.textContent = '確認登艦並傳送數據';
                }
            } catch (e) {
                alert('網路錯誤');
                btn.disabled = false;
                btn.textContent = '確認登艦並傳送數據';
            }
        }

        async function showProducts() {
            if(jumpTimer) clearInterval(jumpTimer); 
            setAppState('product');
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '<div class="neon-text" style="display:block; margin-top:2rem;">正在同步衛星物資清單...</div>';
            
            try {
                const res = await fetch(`${API_BASE}/config`);
                const config = await res.json();
                
                if (!config.products || config.products.length === 0) {
                    grid.innerHTML = '<div style="color:var(--text-muted); margin-top:2rem;">目前無補給品資料</div>';
                    return;
                }

                grid.innerHTML = config.products.map(p => `
                    <div class="cyber-card panel-border" style="padding:0; overflow:hidden; border-radius:1rem; border-left:none;">
                        ${p.image ? `<img src="${p.image}" style="width:100%; height:200px; object-fit:contain; background:rgba(0,0,0,0.3); border-bottom:1px solid var(--accent-gray);">` : `<div style="height:200px; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.3); color:var(--text-muted);">無影像資料</div>`}
                        <div style="padding:1.5rem;">
                            <h3 class="neon-text" style="font-size:1.2rem; margin-bottom:0.5rem; display:block;">${p.name}</h3>
                            <p style="color:var(--text-muted); font-size:0.9rem; height:4rem; overflow:hidden; margin-bottom:1.5rem;">${p.description || ''}</p>
                            ${p.link ? `<a href="${p.link}" target="_blank" class="button cyber-button" style="display:block; text-align:center; text-decoration:none;">查看規格</a>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch(e) { grid.innerHTML = '<div class="neon-text" style="color:#dc2626; margin-top:2rem;">連線失敗，無法取得物資清單。</div>'; }
        }

        window.onload = async () => {
            try {
                const res = await fetch(`${API_BASE}/config`);
                if (res.ok) {
                    systemConfigData = await res.json();
                    const st = document.getElementById('status');
                    st.textContent = '🟢 已連線雲端';
                    st.style.color = '#16a34a';
                }
            } catch(e) {}
        };
    </script>
</body>
</html>
