<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧方舟 - 航空登機系統</title>
    <link rel="stylesheet" href="smart-ark-theme.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", "Michroma", "Stick", sans-serif; }
        body { line-height: 1.6; color: #fff; }
        header { padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 1200px; margin: 0 auto; padding: 3rem 1.5rem; }
        .state-hidden { display: none !important; }

        /* 首頁雙按鈕 */
        .home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 3rem; margin-top: 2rem; }
        .home-card { padding: 5rem 2rem; text-align: center; cursor: pointer; border-radius: 1.5rem; min-height: 400px; display: flex; flex-direction: column; justify-content: center; }
        .home-card h2 { margin: 1.5rem 0 1rem 0; font-size: 2.2rem; }
        
        /* 驗證方式四宮格 */
        .verify-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 2rem; }
        .verify-card { padding: 2rem 1.5rem; text-align: center; cursor: pointer; border-radius: 1rem; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        .verify-card h3 { margin-top: 1rem; font-size: 1.3rem; }
        @media(max-width: 768px) { .verify-grid { grid-template-columns: 1fr; } }

        .form-card { max-width: 600px; margin: 0 auto; padding: 3rem; text-align: center; border-radius: 1.5rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem; margin-top: 2rem; }
        .product-img { width: 100%; height: 220px; object-fit: contain; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--accent-gray); }

        .btn-back-nav {
            background: none; border: 1px solid var(--accent-gray); color: var(--text-dark);
            padding: 0.5rem 1.2rem; border-radius: 0.5rem; cursor: pointer; font-weight: bold;
            transition: 0.3s; margin-bottom: 1.5rem; display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-back-nav:hover { border-color: var(--text-dark); background: rgba(0, 229, 255, 0.1); }

        .cyber-input { width: 100%; margin-bottom: 1.5rem; padding: 1.2rem; font-size: 1.2rem; }
        .cyber-button { width: 100%; margin-top: 0.5rem; padding: 1.2rem; font-size: 1.1rem; }
        
        .group-item { padding: 1.5rem; border-bottom: 1px solid rgba(0,229,255,0.2); cursor: pointer; transition: 0.3s; text-align: left; display: flex; justify-content: space-between; align-items: center;}
        .group-item:hover { background: rgba(0,229,255,0.1); }
        .info-box { text-align: left; padding: 1.5rem; border-radius: 1rem; margin: 1.5rem 0; background: rgba(0,0,0,0.5); border: 1px solid var(--accent-gray); }
    </style>
</head>
<body class="circuit-background">
    <div class="ark-background"></div>

    <header class="panel-border" style="border-top:none; border-left:none; border-right:none; background: rgba(10,20,35,0.85); backdrop-filter: blur(15px);">
        <div class="header-container">
            <div onclick="resetToHome()" style="cursor:pointer; color:var(--text-dark); font-weight: bold; font-size: 1.1rem;">✈️ 航班大廳</div>
            <div class="neon-text" style="font-size: 1.4rem;">BOARDING SYSTEM</div>
            <div id="status" style="font-size: 0.85rem; color: #888;">🛰️ 航線同步正常</div>
        </div>
    </header>

    <main>
        <div id="homeState">
            <h1 class="neon-text" style="text-align:center; margin-bottom: 2rem; font-size: 3rem; display: block;">請選擇服務項目</h1>
            <div class="home-grid">
                <div class="home-card cyber-card cyber-hover" onclick="setAppState('methodSelection')">
                    <div style="font-size:6rem;">🎫</div>
                    <h2 class="neon-text">辦理登機報到</h2>
                    <p style="color:#aaa; font-size:1.1rem;">CHECK-IN</p>
                </div>
                <div class="home-card cyber-card cyber-hover" onclick="showProducts()">
                    <div style="font-size:6rem;">🛍️</div>
                    <h2 class="neon-text">免稅商品專區</h2>
                    <p style="color:#aaa; font-size:1.1rem;">DUTY-FREE SHOP</p>
                </div>
            </div>
        </div>

        <div id="methodSelectionState" class="state-hidden">
            <button class="btn-back-nav" onclick="resetToHome()">← 返回大廳</button>
            <div style="text-align:center; max-width:800px; margin: 0 auto;">
                <h2 class="neon-text" style="font-size: 2.2rem; margin-bottom:1rem;">請選擇您的驗證方式</h2>
                <div class="verify-grid">
                    <div class="verify-card cyber-card cyber-hover" onclick="setMode('name', '姓名')">
                        <div style="font-size:3.5rem;">📝</div>
                        <h3 class="neon-text">姓名報到</h3>
                    </div>
                    <div class="verify-card cyber-card cyber-hover" onclick="setMode('phone', '手機')">
                        <div style="font-size:3.5rem;">📱</div>
                        <h3 class="neon-text">手機號碼報到</h3>
                    </div>
                    <div class="verify-card cyber-card cyber-hover" onclick="setMode('email', 'Email')">
                        <div style="font-size:3.5rem;">✉️</div>
                        <h3 class="neon-text">Email 報到</h3>
                    </div>
                    <div class="verify-card cyber-card cyber-hover" onclick="setMode('company', '公司')">
                        <div style="font-size:3.5rem;">🏢</div>
                        <h3 class="neon-text">公司名稱報到</h3>
                    </div>
                </div>
            </div>
        </div>

        <div id="actionState" class="state-hidden">
            <button class="btn-back-nav" onclick="setAppState('methodSelection')">← 重新選擇驗證方式</button>
            <div class="form-card cyber-card">
                <h2 id="actionTitle" class="neon-text" style="margin-bottom: 2rem; font-size: 2rem;">登機驗證</h2>
                <input type="text" id="actionInput" class="cyber-input" placeholder="請輸入資訊">
                <button class="cyber-button" style="width:100%; margin-top: 1rem;" onclick="handleAction()"><span>啟動搜尋</span></button>
            </div>
        </div>

        <div id="groupListState" class="state-hidden">
            <button class="btn-back-nav" onclick="setAppState('action')">← 重新搜尋</button>
            <div class="form-card cyber-card" style="max-width: 700px;">
                <h2 id="groupName" class="neon-text" style="margin-bottom: 1.5rem;">請選擇旅客</h2>
                <div id="groupList" class="panel-border" style="background: rgba(0,0,0,0.3); border-radius: 1rem; max-height:450px; overflow-y:auto;"></div>
            </div>
        </div>

        <div id="mealState" class="state-hidden">
            <button class="btn-back-nav" onclick="setAppState(window.tempData && window.tempData.length > 1 ? 'groupList' : 'action')">← 返回</button>
            <div class="form-card cyber-card">
                <h2 class="neon-text" style="margin-bottom:2rem;">🍽️ 機上餐飲偏好</h2>
                <div id="mealOptions"></div>
                <button id="finalBtn" class="cyber-button" disabled style="margin-top: 2rem; font-size:1.3rem; padding:1.5rem;" onclick="submitCheckin()"><span>確認並發行登機證</span></button>
            </div>
        </div>

        <div id="successState" class="state-hidden">
            <div class="form-card cyber-card">
                <div id="successIcon" style="color:var(--text-dark); font-size:6rem; line-height: 1; margin-bottom: 1rem;">✈️</div>
                <h2 id="successTitle" class="neon-text" style="margin-bottom:1rem; font-size: 2.5rem;">登機手續完成！</h2>
                <div id="successInfo" class="info-box panel-border"></div>
                <button class="cyber-button" onclick="resetToHome()"><span>🏠 完成並回到大廳</span></button>
            </div>
        </div>

        <div id="productState" class="state-hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3rem;">
                <div>
                    <h1 class="neon-text" style="font-size: 2.5rem;">🛍️ 免稅商品專區</h1>
                    <p style="color: #888;">機上預購 / 限量供應</p>
                </div>
                <button class="cyber-button" style="width:auto;" onclick="resetToHome()"><span>← 回航班大廳</span></button>
            </div>
            <div id="productsGrid" class="products-grid"></div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        let searchMethod = '', selectedUser = null, systemConfig = null;

        function setAppState(s) {
            ['home', 'methodSelection', 'action', 'groupList', 'meal', 'success', 'product'].forEach(x => {
                document.getElementById(x+'State').classList.add('state-hidden');
            });
            document.getElementById(s+'State').classList.remove('state-hidden');
            window.scrollTo(0, 0);
        }

        function resetToHome() { setAppState('home'); }

        function setMode(method, label) {
            searchMethod = method;
            document.getElementById('actionTitle').textContent = `請輸入${label}`;
            document.getElementById('actionInput').value = '';
            document.getElementById('actionInput').placeholder = `輸入${label}...`;
            setAppState('action');
        }

        async function handleAction() {
            const val = document.getElementById('actionInput').value.trim();
            if(!val) return;
            try {
                const res = await fetch(`${API_BASE}/search/${searchMethod}?${searchMethod}=${encodeURIComponent(val)}`);
                const json = await res.json();
                if (json.data && json.data.length > 0) {
                    if (json.data.length === 1 && searchMethod !== 'company') {
                        selectedUser = json.data[0]; 
                        renderMealOptions();
                    } else {
                        window.tempData = json.data;
                        renderUserList(json.data, searchMethod === 'company' ? '該公司航班名單' : '找到多位旅客，請選擇');
                    }
                } else alert('查無此旅客資料');
            } catch(e) { alert('系統連線異常'); }
        }

        function renderUserList(users, title) {
            document.getElementById('groupName').textContent = title;
            document.getElementById('groupList').innerHTML = users.map(u => `
                <div class="group-item" onclick="selectSingleUser('${u.id}')">
                    <div>
                        <b style="font-size:1.2rem; color:var(--text-dark);">${u.name}</b>
                        <div style="font-size:0.9rem; color:#aaa; margin-top:0.3rem;">${u.company || '個人旅客'}</div>
                    </div>
                    <span style="font-size:0.95rem; font-weight:bold; color:${u.status === 'checked_in' || u.status === '已報到' ? 'var(--text-dark)' : '#666'}">
                        ${u.status === 'checked_in' || u.status === '已報到' ? '🟢 已登機' : '⚪ 待劃位'}
                    </span>
                </div>`).join('');
            setAppState('groupList');
        }

        function selectSingleUser(id) {
            selectedUser = window.tempData.find(u => u.id === id);
            renderMealOptions();
        }

        // ★ 修改後的精簡 Emoji 配置
        const mealEmojis = {
            '葷食': '🍱', 
            '素食': '🥗', 
            '不須用餐': '❌'
        };

        function renderMealOptions() {
            const options = (systemConfig && systemConfig.meal_types) ? systemConfig.meal_types : ['葷食', '素食', '不須用餐'];
            document.getElementById('mealOptions').innerHTML = options.map(m => {
                // 如果選項名稱包含關鍵字，就顯示對應圖示，否則顯示餐盤
                let icon = '🍽️';
                if (m.includes('葷')) icon = mealEmojis['葷食'];
                else if (m.includes('素')) icon = mealEmojis['素食'];
                else if (m.includes('不') || m.includes('否')) icon = mealEmojis['不須用餐'];
                
                return `
                <div class="cyber-card cyber-hover panel-border" id="m-${m}" onclick="selectMeal('${m}')" 
                     style="padding:1.5rem; margin-bottom:1.2rem; cursor:pointer; display:flex; align-items:center; gap:1.2rem; background:rgba(0,0,0,0.4);">
                    <span style="font-size:1.8rem;">${icon}</span> <span style="font-weight:bold; font-size:1.2rem;">${m}</span>
                </div>`;
            }).join('');
            window.selectedMeal = '';
            document.getElementById('finalBtn').disabled = true;
            setAppState('meal');
        }

        function selectMeal(m) {
            window.selectedMeal = m;
            document.querySelectorAll('[id^="m-"]').forEach(el => {
                el.style.borderColor = 'rgba(0, 229, 255, 0.3)';
                el.style.background = 'rgba(0,0,0,0.4)';
            });
            const sel = document.getElementById('m-'+m);
            sel.style.borderColor = 'var(--text-dark)';
            sel.style.background = 'rgba(0, 229, 255, 0.15)';
            document.getElementById('finalBtn').disabled = false;
        }

        async function submitCheckin() {
            const btn = document.getElementById('finalBtn');
            btn.disabled = true; btn.innerHTML = '<span>📡 開立登機證中...</span>';
            try {
                const res = await fetch(`${API_BASE}/checkin/${selectedUser.id}`, { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ meal: window.selectedMeal }) 
                });
                const json = await res.json();
                const info = document.getElementById('successInfo');
                if (json.success) {
                    document.getElementById('successIcon').textContent = '🎫';
                    document.getElementById('successTitle').textContent = '登機手續完成！';
                    info.innerHTML = `
                        <p><b>旅客姓名：</b>${json.data.name}</p>
                        <p><b>所屬單位：</b>${json.data.company || '個人旅客'}</p>
                        <p><b>機上餐飲：</b>${json.data.meal}</p>
                        <p><b>劃位時間：</b>${json.data.checkedInAt}</p>`;
                } else if (json.error === 'already_done') {
                    document.getElementById('successIcon').textContent = '⚠️';
                    document.getElementById('successTitle').textContent = '重複劃位紀錄';
                    info.innerHTML = `
                        <div style="color:#ff4d4d; font-weight:bold; border-bottom:1px solid #ff4d4d; margin-bottom:1rem; padding-bottom:0.5rem; font-size:1.1rem;">此旅客已完成登機手續</div>
                        <p><b>姓名：</b>${json.data.name}</p>
                        <p><b>初次劃位：</b>${json.data.checkedInAt}</p>
                        <p><b>原定餐飲：</b>${json.data.meal}</p>`;
                }
                setAppState('success');
            } catch (e) { alert('系統中斷'); btn.disabled=false; }
        }

        async function showProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '<div class="neon-text" style="font-size:1.5rem;">讀取免稅型錄中...</div>';
            setAppState('product');
            try {
                const res = await fetch(`${API_BASE}/config`);
                const config = await res.json();
                if (config.products && config.products.length > 0) {
                    grid.innerHTML = config.products.map(p => `
                        <div class="cyber-card panel-border" style="padding:0; overflow:hidden; border-radius:1rem;">
                            ${p.image ? `<img src="${p.image}" class="product-img">` : `<div class="product-img" style="display:flex;align-items:center;justify-content:center;color:#555;">無影像</div>`}
                            <div style="padding:1.8rem;">
                                <h3 class="neon-text" style="font-size:1.3rem; margin-bottom:0.8rem;">${p.name}</h3>
                                <p style="color:#aaa; font-size:0.95rem; height:4.5rem; overflow:hidden;">${p.description || '暫無說明'}</p>
                                ${p.link ? `<a href="${p.link}" target="_blank" class="cyber-button" style="display:block;text-align:center;text-decoration:none;margin-top:1.5rem;padding:0.8rem;"><span>了解詳情</span></a>` : ''}
                            </div>
                        </div>`).join('');
                } else grid.innerHTML = '<div class="neon-text">型錄尚未更新</div>';
            } catch(e) { grid.innerHTML = '<div class="neon-text">通訊異常</div>'; }
        }

        window.onload = async () => {
            try {
                const res = await fetch(`${API_BASE}/config`);
                if (res.ok) {
                    systemConfig = await res.json();
                    document.getElementById('status').textContent = '🟢 航線同步正常';
                    document.getElementById('status').style.color = '#00e5ff';
                }
            } catch(e) {}
            setAppState('home');
        };
    </script>
</body>
</html>
