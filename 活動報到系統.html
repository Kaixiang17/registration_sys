<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧方舟 - 艦隊導航系統</title>
    <link rel="stylesheet" href="smart-ark-theme.css">
    <style>
        /* 基礎排版優化 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", "Michroma", "Stick", sans-serif; }
        body { line-height: 1.6; color: #fff; }
        header { padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 1200px; margin: 0 auto; padding: 3rem 1.5rem; }
        .state-hidden { display: none !important; }

        /* ★ 格子大小調整：增加高度與間距，符合操作比例 */
        .mode-selection-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 2.5rem; 
            margin-top: 2rem;
        }
        .mode-card { 
            padding: 4rem 2rem; /* 增加內距讓格子更大 */
            text-align: center; 
            cursor: pointer; 
            border-radius: 1.25rem; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 350px; /* 固定最小高度確保比例統一 */
        }
        .mode-card h2 { margin: 1.5rem 0 0.8rem 0; font-size: 1.8rem; }
        .mode-card p { color: rgba(255,255,255,0.6); font-size: 1rem; line-height: 1.5; }
        
        /* 表單置中排版 */
        .form-card { max-width: 550px; margin: 0 auto; padding: 3rem; text-align: center; border-radius: 1.5rem; }

        /* 商品展示 */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem; margin-top: 2rem; }
        .product-img { width: 100%; height: 220px; object-fit: contain; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--accent-gray); }

        /* 返回按鈕樣式強化 */
        .btn-back-nav {
            background: none; border: 1px solid var(--accent-gray); color: var(--text-dark);
            padding: 0.5rem 1.2rem; border-radius: 0.5rem; cursor: pointer; font-weight: bold;
            transition: 0.3s; margin-bottom: 1rem; display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-back-nav:hover { border-color: var(--text-dark); background: rgba(0, 229, 255, 0.1); }
    </style>
</head>
<body class="circuit-background">
    <div class="ark-background"></div>

    <header class="panel-border" style="border-top:none; border-left:none; border-right:none; background: rgba(10,20,35,0.85); backdrop-filter: blur(15px);">
        <div class="header-container">
            <div onclick="resetToHome()" style="cursor:pointer; color:var(--text-dark); font-weight: bold; font-size: 1.1rem;">🏠 方舟主機</div>
            <div class="neon-text" style="font-size: 1.4rem;">COMMAND CENTER</div>
            <div id="status" style="font-size: 0.85rem; color: #888;">🛰️ 衛星鏈路正常</div>
        </div>
    </header>

    <main>
        <div id="modeState">
            <h1 class="neon-text" style="text-align:center; margin-bottom: 3.5rem; font-size: 2.8rem; display: block;">請選擇登艦模組</h1>
            <div class="mode-selection-grid">
                <div class="mode-card cyber-card cyber-hover" onclick="setMode('individual')">
                    <div style="font-size:5rem;">👤</div>
                    <h2 class="neon-text">個人報到</h2>
                    <p>使用電話、姓名或 Email<br>快速驗證身分並完成登艦。</p>
                </div>
                <div class="mode-card cyber-card cyber-hover" onclick="setMode('group')">
                    <div style="font-size:5rem;">🏢</div>
                    <h2 class="neon-text">公司團體報到</h2>
                    <p>針對企業艦隊成員<br>提供批次核對與能量補給配置。</p>
                </div>
                <div class="mode-card cyber-card cyber-hover" onclick="showProducts()">
                    <div style="font-size:5rem;">🛍️</div>
                    <h2 class="neon-text">活動商品專區</h2>
                    <p>瀏覽本次任務專屬物資<br>查看詳細規格與補給資訊。</p>
                </div>
            </div>
        </div>

        <div id="actionState" class="state-hidden">
            <button class="btn-back-nav" onclick="resetToHome()">← 返回主選單</button>
            <div class="form-card cyber-card">
                <h2 id="actionTitle" class="neon-text" style="margin-bottom: 2rem; font-size: 2rem;">身分驗證</h2>
                <input type="text" id="actionInput" class="cyber-input" style="font-size: 1.2rem; padding: 1.2rem;" placeholder="請輸入資訊">
                <p style="color:var(--accent-gray); font-size: 0.9rem; margin-top: 0.8rem; text-align: left;">* 系統將自動比對您的報名資料</p>
                <button class="cyber-button" style="width:100%; margin-top: 2rem; padding: 1.2rem;" onclick="handleAction()"><span>啟動搜尋</span></button>
            </div>
        </div>

        <div id="companySelectionState" class="state-hidden">
            <button class="btn-back-nav" onclick="setAppState('action')">← 返回驗證</button>
            <div class="form-card cyber-card">
                <h2 class="neon-text" style="margin-bottom:2rem;">請確認所屬艦隊</h2>
                <div id="companyList" style="display:grid; gap:1.2rem; text-align:left;"></div>
            </div>
        </div>

        <div id="groupListState" class="state-hidden">
            <button class="btn-back-nav" onclick="setAppState('action')">← 重新搜尋</button>
            <div class="form-card cyber-card" style="max-width: 700px;">
                <h2 id="groupName" class="neon-text" style="margin-bottom: 1.5rem;">艦隊人員名單</h2>
                <div id="groupList" class="group-list panel-border" style="background: rgba(0,0,0,0.3);"></div>
                <button class="cyber-button" style="width:100%; margin-top: 2rem;" onclick="proceedToMeal()"><span>配置全員補給</span></button>
            </div>
        </div>

        <div id="mealState" class="state-hidden">
            <button class="btn-back-nav" onclick="setAppState(checkMode==='individual'?'action':'groupList')">← 回上一步</button>
            <div class="form-card cyber-card">
                <h2 class="neon-text" style="margin-bottom:2rem;">🍱 能量補給配置</h2>
                <div id="mealOptions"></div>
                <button id="finalBtn" class="cyber-button" disabled style="width:100%; margin-top: 2rem;" onclick="submitCheckin()"><span>確認報到並登艦</span></button>
            </div>
        </div>

        <div id="successState" class="state-hidden">
            <div class="form-card cyber-card">
                <div style="color:var(--text-dark); font-size:6rem; line-height: 1; margin-bottom: 1rem;">✓</div>
                <h2 class="neon-text" style="margin-bottom:2rem; font-size: 2.5rem;">登艦成功！</h2>
                <div id="successInfo" class="info-box panel-border"></div>
                <p style="color:#aaa; margin: 1.5rem 0;">同步完成。即將導航至補給專區...</p>
                <button class="cyber-button" onclick="showProducts()"><span>🛍️ 直接前往補給專區</span></button>
            </div>
        </div>

        <div id="productState" class="state-hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3rem;">
                <div>
                    <h1 class="neon-text" style="font-size: 2.5rem;">🛍️ 物資補給清單</h1>
                    <p style="color: #888;">方舟任務專屬配置物品</p>
                </div>
                <button class="cyber-button" onclick="resetToHome()"><span>← 回首頁</span></button>
            </div>
            <div id="productsGrid" class="products-grid"></div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        let checkMode = '', selectedUser = null, matchedCompanies = [], selectedGroup = [], selectedMeal = '', systemConfig = null;

        function setAppState(s) {
            ['mode', 'action', 'companySelection', 'groupList', 'meal', 'success', 'product'].forEach(x => {
                const el = document.getElementById(x+'State');
                if(el) el.classList.add('state-hidden');
            });
            document.getElementById(s+'State').classList.remove('state-hidden');
            window.scrollTo(0, 0);
        }

        function resetToHome() { setAppState('mode'); }

        function setMode(m) {
            checkMode = m;
            document.getElementById('actionTitle').textContent = m === 'individual' ? '個人報到驗證' : '企業艦隊搜尋';
            document.getElementById('actionInput').value = '';
            document.getElementById('actionInput').placeholder = m === 'individual' ? '請輸入姓名或電話' : '請輸入公司關鍵字';
            setAppState('action');
        }

        async function handleAction() {
            const val = document.getElementById('actionInput').value.trim();
            if(!val) return;
            try {
                // 改用 keyword 綜合搜尋 (支援姓名/電話/Email)
                const searchMethod = checkMode === 'individual' ? 'keyword' : 'company';
                const res = await fetch(`${API_BASE}/search/${searchMethod}?${searchMethod}=${encodeURIComponent(val)}`);
                const json = await res.json();
                if (json.data && json.data.length > 0) {
                    if (checkMode === 'individual') { 
                        selectedUser = json.data[0]; 
                        renderMealOptions();
                        setAppState('meal'); 
                    } else { 
                        const groups = {}; 
                        json.data.forEach(p => { if(!groups[p.company]) groups[p.company] = []; groups[p.company].push(p); });
                        matchedCompanies = Object.keys(groups).map(name => ({ name, participants: groups[name] }));
                        if (matchedCompanies.length === 1) selectCompany(0);
                        else renderCompanyList();
                    }
                } else alert('查無此身分資料，請重新輸入');
            } catch(e) { alert('伺服器衛星連線異常'); }
        }

        function renderCompanyList() {
            document.getElementById('companyList').innerHTML = matchedCompanies.map((c, i) => 
                `<div class="cyber-card cyber-hover" onclick="selectCompany(${i})" style="padding:1.5rem; cursor:pointer; border-left:6px solid var(--text-dark);">
                    <b style="font-size:1.2rem;">${c.name}</b> <br> <span style="color:#aaa;">(${c.participants.length} 位成員)</span>
                </div>`).join('');
            setAppState('companySelection');
        }

        function selectCompany(index) {
            const company = matchedCompanies[index];
            document.getElementById('groupName').textContent = company.name;
            document.getElementById('groupList').innerHTML = company.participants.map(u => {
                const isCheck = u.status === 'checked_in' || u.status === '已報到';
                return `<div class="group-item">
                            <input type="checkbox" value="${u.id}" class="u-cb" ${isCheck ? 'disabled' : ''} style="margin-right:20px; transform:scale(1.8); cursor:pointer;"> 
                            <span style="flex:1; font-weight:bold; font-size:1.1rem;">${u.name}</span>
                            <span style="font-size:0.9rem; color:${isCheck ? 'var(--text-dark)' : '#666'}">${isCheck ? '🟢 已登艦' : '⚪ 待命'}</span>
                        </div>`;
            }).join('');
            window.tempGroupData = company.participants;
            setAppState('groupList');
        }

        function proceedToMeal() {
            const ids = Array.from(document.querySelectorAll('.u-cb:checked')).map(cb => cb.value);
            selectedGroup = window.tempGroupData.filter(u => ids.includes(u.id));
            if (selectedGroup.length === 0) return alert('請至少勾選一位尚未報到的成員');
            renderMealOptions();
            setAppState('meal');
        }

        function renderMealOptions() {
            const options = (systemConfig && systemConfig.meal_types) ? systemConfig.meal_types : ['葷食', '素食', '不須用餐'];
            const container = document.getElementById('mealOptions');
            container.innerHTML = options.map(m => `
                <div class="cyber-card cyber-hover panel-border" id="m-${m}" onclick="selectMeal('${m}')" 
                     style="padding:1.5rem; margin-bottom:1.2rem; cursor:pointer; display:flex; align-items:center; gap:1.2rem; background:rgba(0,0,0,0.4);">
                    <span style="font-size:1.5rem;">🍱</span> <span style="font-weight:bold;">${m}</span>
                </div>
            `).join('');
            selectedMeal = '';
            document.getElementById('finalBtn').disabled = true;
        }

        function selectMeal(m) {
            selectedMeal = m;
            document.querySelectorAll('[id^="m-"]').forEach(el => {
                el.style.borderColor = 'rgba(0, 229, 255, 0.3)';
                el.style.background = 'rgba(0,0,0,0.4)';
            });
            const sel = document.getElementById('m-'+m);
            sel.style.borderColor = 'var(--text-dark)';
            sel.style.background = 'rgba(0, 229, 255, 0.15)';
            document.getElementById('finalBtn').disabled = false;
        }

        async function submitCheckin() {
            const btn = document.getElementById('finalBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>📡 正在同步數據...</span>';
            const isIndiv = checkMode === 'individual';
            const url = isIndiv ? `${API_BASE}/checkin/${selectedUser.id}` : `${API_BASE}/checkin/batch`;
            const body = isIndiv ? { meal: selectedMeal, name: selectedUser.name } : { selections: selectedGroup.map(u => ({ id: u.id, name: u.name, meal: selectedMeal })) };
            
            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                const json = await res.json();
                if (json.success) {
                    const infoBox = document.getElementById('successInfo');
                    const p = isIndiv ? json.data : json.data[0];
                    infoBox.innerHTML = isIndiv 
                        ? `<p><b>登艦人員：</b>${p.name}</p><p><b>艦隊單位：</b>${p.company || '個人'}</p><p><b>能量配置：</b>${p.meal}</p>`
                        : `<p><b>艦隊單位：</b>${p.company}</p><p><b>登艦人數：</b>${json.data.length} 位成員</p><p><b>全員補給：</b>${selectedMeal}</p>`;
                    setAppState('success');
                    // 5秒後跳轉商品頁
                    setTimeout(() => { if(document.getElementById('successState').offsetParent) showProducts(); }, 5000);
                } else alert('報到同步失敗');
            } catch (e) { alert('伺服器連線中斷'); }
        }

        // ★ 修改：確保正確顯示後台設定的圖片
        async function showProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '<div class="neon-text" style="font-size:1.5rem;">正在同步補給清單...</div>';
            setAppState('product');
            try {
                const res = await fetch(`${API_BASE}/config`);
                const config = await res.json();
                if (config.products && config.products.length > 0) {
                    grid.innerHTML = config.products.map(p => `
                        <div class="cyber-card panel-border" style="padding:0; overflow:hidden; border-radius:1rem;">
                            ${p.image ? `<img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/300x200?text=NO+IMAGE'">` : `<div class="product-img" style="display:flex;align-items:center;justify-content:center;color:#555;">[ 無影像資料 ]</div>`}
                            <div style="padding:1.8rem;">
                                <h3 class="neon-text" style="font-size:1.3rem; margin-bottom:0.8rem;">${p.name}</h3>
                                <p style="color:#aaa; font-size:0.95rem; height:4.5rem; overflow:hidden;">${p.description || '暫無說明'}</p>
                                ${p.link ? `<a href="${p.link}" target="_blank" class="cyber-button" style="display:block;text-align:center;text-decoration:none;margin-top:1.5rem;padding:0.8rem;"><span>查看規格詳情</span></a>` : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<div class="neon-text">目前補給庫存為空。</div>';
                }
            } catch(e) { grid.innerHTML = '<div class="neon-text">無法連結補給庫。</div>'; }
        }

        window.onload = async () => {
            try {
                const res = await fetch(`${API_BASE}/config`);
                if (res.ok) {
                    systemConfig = await res.json();
                    document.getElementById('status').textContent = '🟢 衛星鏈路正常';
                    document.getElementById('status').style.color = '#00e5ff';
                }
            } catch(e) {}
        };
    </script>
</body>
</html>
