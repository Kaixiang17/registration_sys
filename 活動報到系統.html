<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧方舟 - 艦隊報到系統</title>
    <link rel="stylesheet" href="smart-ark-theme.css">
    <style>
        /* 融合部分自定義樣式 */
        .info-box {
            text-align: left; 
            background: rgba(249, 250, 251, 0.9); 
            padding: 1.5rem; 
            border-radius: 0.75rem; 
            border: 1px solid var(--accent-gray); 
            font-size: 1.05rem; 
            line-height: 1.8;
            margin: 1.5rem 0;
            color: var(--text-muted);
        }
        .group-list { 
            margin-top: 1rem; 
            max-height: 350px; 
            overflow-y: auto; 
            text-align: left; 
        }
        .group-item { 
            display: flex; 
            align-items: center; 
            padding: 1rem; 
            border-bottom: 1px solid rgba(168, 168, 168, 0.2); 
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px;
        }
        /* 修正按鈕在科技感下的狀態 */
        .cyber-button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body class="circuit-background">
    <div class="ark-background"></div>
    
    <header class="panel-border" style="background: rgba(255,255,255,0.95); border-top:none; border-left:none; border-right:none;">
        <div class="header-container">
            <div onclick="location.reload()" style="cursor:pointer; color:var(--text-muted); font-weight:600;">🏠 首頁導航</div>
            <div class="header-title neon-text">智慧方舟 - 報到系統</div>
            <div id="status" style="font-size: 0.8rem; color: var(--text-muted);">🛰️ 衛星連線中...</div>
        </div>
    </header>

    <main>
        <div id="modeState">
            <h1 class="neon-text" style="text-align:center; margin-bottom: 3rem; font-size: 2.5rem;">歡迎登艦</h1>
            <div class="mode-selection-grid">
                <div class="mode-card cyber-card cyber-hover" onclick="setMode('individual')">
                    <span style="font-size:3rem;">👤</span>
                    <h2 class="neon-text">個人報到</h2>
                    <p style="font-size:0.9rem; color:var(--text-muted);">啟動身分驗證，單人登艦</p>
                </div>
                <div class="mode-card cyber-card cyber-hover" onclick="setMode('group')">
                    <span style="font-size:3rem;">🏢</span>
                    <h2 class="neon-text">公司團體報到</h2>
                    <p style="font-size:0.9rem; color:var(--text-muted);">企業艦隊成員批次登艦</p>
                </div>
                <div class="mode-card cyber-card cyber-hover" onclick="location.href='/商品頁面.html'">
                    <span style="font-size:3rem;">🛍️</span>
                    <h2 class="neon-text">補給展示廳</h2>
                    <p style="font-size:0.9rem; color:var(--text-muted);">瀏覽方舟精選物資</p>
                </div>
            </div>
        </div>

        <div id="actionState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="setAppState('mode')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 id="actionTitle" class="neon-text" style="margin: 1.5rem 0;">啟動驗證</h2>
                <input type="text" id="actionInput" class="cyber-input" placeholder="請輸入資訊">
                <button class="button cyber-button" onclick="handleAction()"><span>下一步：同步資料</span></button>
            </div>
        </div>

        <div id="companySelectionState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="setAppState('action')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 class="neon-text" style="margin-bottom:1rem;">選擇所屬艦隊</h2>
                <div id="companyList" style="display:grid; gap:1rem; text-align:left; margin-top:1.5rem;"></div>
            </div>
        </div>

        <div id="groupListState" class="state-hidden">
            <div class="form-card cyber-card" style="max-width: 600px;">
                <button onclick="setAppState('action')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 id="groupName" class="neon-text" style="margin-bottom:1rem;">艦隊成員名單</h2>
                <div id="groupList" class="group-list panel-border"></div>
                <button class="button cyber-button" style="margin-top:2rem;" onclick="proceedToMeal()"><span>下一步：配置補給</span></button>
            </div>
        </div>

        <div id="mealState" class="state-hidden">
            <div class="form-card cyber-card">
                <button onclick="setAppState(checkMode==='individual'?'action':'groupList')" style="float:left; background:none; border:none; color:gray; cursor:pointer">← 返回</button>
                <div style="clear:both;"></div>
                <h2 class="neon-text">🍱 能量補給配置</h2>
                <div style="margin-top: 2rem;">
                    <div class="meal-option cyber-hover" id="m-葷食" onclick="selectMeal('葷食')">🍖 葷食 (精選能量)</div>
                    <div class="meal-option cyber-hover" id="m-素食" onclick="selectMeal('素食')">🥗 素食 (植感纖維)</div>
                    <div class="meal-option cyber-hover" id="m-不須用餐" onclick="selectMeal('不須用餐')">❌ 不須用餐</div>
                </div>
                <button id="finalBtn" class="button cyber-button" disabled onclick="submitCheckin()" style="margin-top: 1.5rem;"><span>確認報到登艦</span></button>
            </div>
        </div>

        <div id="successState" class="state-hidden">
            <div class="form-card cyber-card">
                <div style="color:var(--text-dark); font-size:4rem; line-height: 1; text-shadow: 0 0 20px var(--text-dark);">✓</div>
                <h2 class="neon-text" style="margin: 1.5rem 0;">登艦成功！</h2>
                
                <div id="successInfo" class="info-box panel-border"></div>
                
                <p style="color:var(--text-muted); margin-bottom: 1.5rem;">同步完成。系統將於 <strong id="timer">2</strong> 秒後自動導向補給廳。</p>
                <button class="button cyber-button" onclick="location.href='/商品頁面.html'"><span>🛍️ 立即前往補給頁</span></button>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';
        let checkMode = '', selectedUser = null, matchedCompanies = [], selectedGroup = [], selectedMeal = '';

        function setAppState(s) {
            ['mode', 'action', 'companySelection', 'groupList', 'meal', 'success'].forEach(x => {
                const el = document.getElementById(x+'State');
                if(el) el.classList.add('state-hidden');
            });
            document.getElementById(s+'State').classList.remove('state-hidden');
        }

        function setMode(m) {
            checkMode = m;
            document.getElementById('actionTitle').textContent = m === 'individual' ? '個人身分驗證' : '企業艦隊搜尋';
            document.getElementById('actionInput').value = '';
            document.getElementById('actionInput').placeholder = m === 'individual' ? '請輸入姓名' : '請輸入公司關鍵字';
            setAppState('action');
        }

        async function handleAction() {
            const val = document.getElementById('actionInput').value.trim();
            if(!val) return;
            try {
                const res = await fetch(`${API_BASE}/search/${checkMode === 'individual' ? 'name' : 'company'}?${checkMode === 'individual' ? 'name' : 'company'}=${val}`);
                const json = await res.json();
                
                if (json.data && json.data.length > 0) {
                    if (checkMode === 'individual') { 
                        selectedUser = json.data[0]; 
                        setAppState('meal'); 
                    } else { 
                        const groups = {}; 
                        json.data.forEach(p => { if(!groups[p.company]) groups[p.company] = []; groups[p.company].push(p); });
                        matchedCompanies = Object.keys(groups).map(name => ({ name, participants: groups[name] }));
                        
                        if (matchedCompanies.length === 1) {
                            selectCompany(0);
                        } else {
                            document.getElementById('companyList').innerHTML = matchedCompanies.map((c, i) => 
                                `<div class="cyber-card cyber-hover" onclick="selectCompany(${i})" style="padding:1rem; cursor:pointer; border-left: 4px solid var(--text-dark);">
                                    <b>${c.name}</b> (${c.participants.length} 人)
                                </div>`).join('');
                            setAppState('companySelection');
                        }
                    }
                } else alert('查無此身分資料，請重新輸入');
            } catch(e) { alert('導航系統連線異常'); }
        }

        function selectCompany(index) {
            const company = matchedCompanies[index];
            document.getElementById('groupName').textContent = company.name;
            document.getElementById('groupList').innerHTML = company.participants.map(u => {
                const isCheck = u.status === 'checked_in' || u.status === '已報到';
                return `<div class="group-item">
                            <input type="checkbox" value="${u.id}" class="u-cb" ${isCheck ? 'disabled' : ''} style="margin-right:15px; width:1.2rem; height:1.2rem; cursor:pointer;"> 
                            <span style="flex:1; font-weight:600;">${u.name}</span>
                            <span style="font-size:0.85rem; color:${isCheck ? '#16a34a' : '#8a8a8a'}">${isCheck ? '🟢 已登艦' : '⚪ 待命'}</span>
                        </div>`;
            }).join('');
            window.tempGroupData = company.participants;
            setAppState('groupList');
        }

        function proceedToMeal() {
            const ids = Array.from(document.querySelectorAll('.u-cb:checked')).map(cb => cb.value);
            selectedGroup = window.tempGroupData.filter(u => ids.includes(u.id));
            if (selectedGroup.length === 0) return alert('請至少勾選一位同仁進行報到');
            setAppState('meal');
        }

        function selectMeal(m) {
            selectedMeal = m;
            document.querySelectorAll('.meal-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('m-'+m).classList.add('selected');
            document.getElementById('finalBtn').disabled = false;
        }

        async function submitCheckin() {
            const btn = document.getElementById('finalBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>📡 傳輸資料中...</span>';
            
            const isIndiv = checkMode === 'individual';
            const url = isIndiv ? `${API_BASE}/checkin/${selectedUser.id}` : `${API_BASE}/checkin/batch`;
            const body = isIndiv ? { meal: selectedMeal, name: selectedUser.name } : { selections: selectedGroup.map(u => ({ id: u.id, name: u.name, meal: selectedMeal })) };
            
            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                const json = await res.json();
                
                if (json.success) {
                    const infoBox = document.getElementById('successInfo');
                    const p = isIndiv ? json.data : json.data[0];
                    
                    if (isIndiv) {
                        infoBox.innerHTML = `
                            <p><b>登艦人員：</b>${p.name}</p>
                            <p><b>所屬艦隊：</b>${p.company || '個人探險者'}</p>
                            <p><b>補給配置：</b>${p.meal}</p>
                            <p><b>登艦時間：</b>${p.checkedInAt}</p>
                        `;
                    } else {
                        infoBox.innerHTML = `
                            <p><b>所屬艦隊：</b>${p.company}</p>
                            <p><b>登艦人數：</b>${json.data.length} 位成員</p>
                            <p><b>全員補給：</b>${selectedMeal}</p>
                            <p><b>最後登艦：</b>${p.checkedInAt}</p>
                        `;
                    }
                    
                    setAppState('success');
                    
                    // 倒數計時並跳轉
                    let count = 2;
                    const timerEl = document.getElementById('timer');
                    const interval = setInterval(() => {
                        count--;
                        if(timerEl) timerEl.textContent = count;
                        if(count <= 0) {
                            clearInterval(interval);
                            location.href = '/商品頁面.html';
                        }
                    }, 1000);

                } else {
                    alert('報到失敗：' + (json.error || '不明錯誤'));
                    btn.disabled = false;
                    btn.innerHTML = '<span>確認報到登艦</span>';
                }
            } catch (e) {
                alert('伺服器連線失敗，請洽詢服務人員');
                btn.disabled = false;
                btn.innerHTML = '<span>確認報到登艦</span>';
            }
        }

        window.onload = async () => {
            try {
                const res = await fetch(`${API_BASE}/config`);
                if (res.ok) {
                    const st = document.getElementById('status');
                    st.textContent = '🟢 衛星已同步';
                    st.style.color = '#16a34a';
                }
            } catch(e) {
                document.getElementById('status').textContent = '🔴 離線模式';
            }
        };
    </script>
</body>
</html>
