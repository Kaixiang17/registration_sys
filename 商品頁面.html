<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動商品專區</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8f7f4;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --text-muted: #666666;
            --border: #e2e0db;
            --success: #16a34a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--primary); }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        /* 頂部歡迎橫幅 */
        .welcome-banner {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border-radius: 1.25rem;
            padding: 2.5rem 2rem;
            text-align: center;
            margin-bottom: 3rem;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .welcome-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .welcome-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .welcome-subtitle {
            font-size: 1rem;
            opacity: 0.85;
        }

        /* 商品區塊標題 */
        .section-heading {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 商品卡片網格 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.75rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.15);
            border-color: var(--primary);
        }

        .product-image-wrapper {
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #f3f4f6;
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: linear-gradient(135deg, #e0e7ff, #ede9fe);
            color: var(--primary);
        }

        .product-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .product-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.4;
        }

        .product-description {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            flex: 1;
        }

        .product-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.6rem;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .product-link-btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.02);
        }

        .product-link-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* 空商品狀態 */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }

        /* 載入中 */
        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e0db;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 底部返回按鈕 */
        .footer-action {
            margin-top: 3rem;
            text-align: center;
        }

        .footer-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 2rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: 0.6rem;
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .footer-back-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(79, 70, 229, 0.04);
        }

        /* 響應式 */
        @media (max-width: 600px) {
            .welcome-title { font-size: 1.4rem; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a class="back-btn" href="javascript:void(0)" onclick="goBack()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                返回報到系統
            </a>
            <span class="header-title">活動商品專區</span>
            <div style="width:80px;"></div>
        </div>
    </header>

    <main>
        <!-- 歡迎橫幅 -->
        <div class="welcome-banner">
            <div class="welcome-icon">🎉</div>
            <div class="welcome-title">報到成功！歡迎參加本次活動</div>
            <div class="welcome-subtitle">以下為本次活動精選商品，歡迎瀏覽選購</div>
        </div>

        <!-- 商品列表 -->
        <div class="section-heading">
            🛍️ 精選商品
        </div>

        <div id="productsContainer">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>載入商品資料中...</p>
            </div>
        </div>

        <!-- 底部返回 -->
        <div class="footer-action">
            <a class="footer-back-btn" href="javascript:void(0)" onclick="goBack()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                返回報到系統
            </a>
        </div>
    </main>

    <script>
        const API_BASE = '/api';

        function goBack() {
            // 優先使用 history.back()，若無歷史紀錄則導回主頁
            if (document.referrer && document.referrer.includes(window.location.hostname)) {
                history.back();
            } else {
                window.location.href = '/';
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productsContainer');

            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <div class="empty-title">目前尚無商品資料</div>
                        <p>請在 config.json 中的 "products" 陣列新增商品。</p>
                    </div>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'products-grid';

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';

                // 圖片區域
                let imageHtml;
                if (product.image) {
                    imageHtml = `
                        <div class="product-image-wrapper">
                            <img class="product-image"
                                 src="${escapeHtml(product.image)}"
                                 alt="${escapeHtml(product.name)}"
                                 onerror="this.parentElement.innerHTML='<div class=\\'product-image-placeholder\\'>🛍️</div>'">
                        </div>`;
                } else {
                    imageHtml = `
                        <div class="product-image-wrapper">
                            <div class="product-image-placeholder">🛍️</div>
                        </div>`;
                }

                // 連結按鈕
                let linkHtml;
                if (product.link) {
                    linkHtml = `
                        <a class="product-link-btn"
                           href="${escapeHtml(product.link)}"
                           target="_blank"
                           rel="noopener noreferrer">
                            前往商品頁面
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <line x1="10" y1="14" x2="21" y2="3"></line>
                            </svg>
                        </a>`;
                } else {
                    linkHtml = `<button class="product-link-btn" disabled style="background:#9ca3af;cursor:not-allowed;">暫無連結</button>`;
                }

                card.innerHTML = `
                    ${imageHtml}
                    <div class="product-body">
                        <div class="product-name">${escapeHtml(product.name || '未命名商品')}</div>
                        <div class="product-description">${escapeHtml(product.description || '')}</div>
                        ${linkHtml}
                    </div>`;

                grid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(grid);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_BASE}/config`);
                if (!res.ok) throw new Error('無法取得設定');
                const config = await res.json();
                renderProducts(config.products || []);
            } catch (e) {
                document.getElementById('productsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-title">載入失敗</div>
                        <p>無法從伺服器取得商品資料，請確認後端服務是否正常運行。</p>
                    </div>`;
            }
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
